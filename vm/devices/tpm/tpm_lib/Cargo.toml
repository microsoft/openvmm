[package]
name = "tpm_lib"
rust-version.workspace = true
edition.workspace = true

[features]
# Use this feature to enable tests that pull in `ms-tpm-20-ref`.
test_tpm = ["ms-tpm-20-ref"]

[dependencies]
ms-tpm-20-ref = { optional = true, workspace = true }
tpm_protocol.workspace = true
cvm_tracing.workspace = true
inspect.workspace = true
crypto.workspace = true

thiserror.workspace = true
tracelimit.workspace = true
tracing.workspace = true
zerocopy.workspace = true

[target.'cfg(not(target_env = "musl"))'.dependencies]
ms-tpm-20-ref = { optional = true, workspace = true, features = ["openssl", "vendored"] }

[dev-dependencies]
getrandom.workspace = true

[lints]
workspace = true

[package.metadata.xtask.unused-deps]
# We need to depend on crypto to ensure the backend gets linked in
# for partial tree builds, like unit tests.
ignored = ["crypto"]